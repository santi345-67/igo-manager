name: Build Mobile App
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd app && npm ci
      - run: cd app && npm run check
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Login to Expo
        run: npx eas login --token ${{ secrets.EAS_TOKEN }}
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
      - name: Build Android AAB
        run: cd app && npx eas build --platform android --profile production --non-interactive
      - name: Build iOS IPA
        run: cd app && npx eas build --platform ios --profile production --non-interactive
